<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Votre idée de Side Project - En Sous-Marin</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png?v=2" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <link rel="shortcut icon" href="favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2" />
    <link rel="manifest" href="site.webmanifest?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="generator-page">
    <a class="generator-logo" href="index.html" aria-label="En Sous-Marin">
      <img src="assets/Plan de travail 1 copie 9.png" alt="En Sous-Marin" />
    </a>

    <button
      class="menu-toggle"
      type="button"
      aria-label="Ouvrir le menu"
      aria-controls="sideMenu"
      aria-expanded="false"
    >
      <span></span>
      <span></span>
    </button>

    <aside id="sideMenu" class="side-menu" aria-hidden="true">
      <div class="side-menu-top">
        <a class="side-menu-logo" href="index.html" aria-label="En Sous-Marin">
          <img src="assets/Plan de travail 1 copie 9.png" alt="En Sous-Marin" />
        </a>
        <button class="menu-close" type="button" aria-label="Fermer le menu">
          <span aria-hidden="true">X</span> Fermer
        </button>
      </div>

      <nav class="side-menu-nav" aria-label="Pages">
        <p class="side-menu-label"><span></span> Pages</p>
        <a href="a-propos.html" class="side-menu-link">À propos</a>
        <a href="mentions-legales.html" class="side-menu-link">Mention légale</a>
        <a href="contact.html" class="side-menu-link">Contact</a>
        <a href="calendly.html" class="side-menu-link">Réserver un échange</a>
      </nav>
    </aside>
    <button class="menu-scrim" type="button" aria-label="Fermer le menu"></button>

    <main class="section app-section generator-section">
      <div class="container generator-container">
        <section class="generator-card dashboard-card" aria-labelledby="generatorTitle">
          <span id="categoryBadge" class="category-badge generator-category-badge">Digital</span>

          <div id="dashboardApp" class="dashboard-app"></div>
          <div id="messageArea" class="message-area generator-message" aria-live="polite"></div>
        </section>

        <p class="home-signature generator-signature">
          © 2026 En Sous-Marin. Tous droits réservés
        </p>
      </div>
    </main>

    <div id="leadModal" class="lead-modal" aria-hidden="true">
      <button class="lead-modal-overlay" type="button" aria-label="Fermer la pop-up"></button>
      <div class="lead-modal-stack" role="dialog" aria-modal="true" aria-labelledby="leadModalTitle">
        <div class="modal-layer modal-layer-red"></div>
        <div class="modal-layer modal-layer-blue"></div>
        <div class="modal-layer modal-layer-green"></div>
        <section class="lead-modal-card">
          <button class="lead-modal-close" type="button" aria-label="Fermer">×</button>
          <h2 id="leadModalTitle">Obtenez votre idée de Side Project avec En Sous-Marin</h2>

          <form id="leadForm" class="lead-form">
            <div class="lead-field">
              <label for="leadEmail">Adresse mail*</label>
              <input
                id="leadEmail"
                type="email"
                autocomplete="email"
                placeholder="prénom.nom@gmail.com"
                required
              />
            </div>

            <label class="lead-checkbox">
              <input id="consentEmailStorage" type="checkbox" required />
              <span>J’accepte que mon adresse mail soit conservée</span>
            </label>

            <label class="lead-checkbox">
              <input id="subscribeNews" type="checkbox" />
              <span>Oui, j’aimerais revoir les actualités d’En Sous-Marin</span>
            </label>

            <button id="leadSubmitButton" class="button lead-submit-button" type="submit">
              M’envoyer mon idée
            </button>

            <div id="leadMessageArea" class="lead-message" aria-live="polite"></div>
          </form>
        </section>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
