<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact - Le générateur d'idées</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png?v=2" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
    <link rel="shortcut icon" href="favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=2" />
    <link rel="manifest" href="site.webmanifest?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="content-page contact-page">
    <a class="generator-logo" href="index.html" aria-label="En Sous-Marin">
      <img src="assets/Plan de travail 1 copie 9.png" alt="En Sous-Marin" />
    </a>

    <button
      class="menu-toggle"
      type="button"
      aria-label="Ouvrir le menu"
      aria-controls="sideMenu"
      aria-expanded="false"
    >
      <span></span>
      <span></span>
    </button>

    <aside id="sideMenu" class="side-menu" aria-hidden="true">
      <div class="side-menu-top">
        <a class="side-menu-logo" href="index.html" aria-label="En Sous-Marin">
          <img src="assets/Plan de travail 1 copie 9.png" alt="En Sous-Marin" />
        </a>
        <button class="menu-close" type="button" aria-label="Fermer le menu">
          <span aria-hidden="true">X</span> Fermer
        </button>
      </div>

      <nav class="side-menu-nav" aria-label="Pages">
        <p class="side-menu-label"><span></span> Pages</p>
        <a href="a-propos.html" class="side-menu-link">À propos</a>
        <a href="mentions-legales.html" class="side-menu-link">Mention légale</a>
        <a href="contact.html" class="side-menu-link">Contact</a>
        <a href="calendly.html" class="side-menu-link">Réserver un échange</a>
      </nav>
    </aside>
    <button class="menu-scrim" type="button" aria-label="Fermer le menu"></button>

    <main class="section content-section">
      <article class="content-card">
        <p class="content-badge">Contact</p>
        <h1>Une question, une idée, un retour ?</h1>
        <p class="content-lead">
          Vous pouvez me contacter pour parler du générateur, d’un cahier des charges,
          d’un épisode d’En Sous-Marin ou d’une collaboration autour des Side Projects.
        </p>

        <!-- Formulaire non branché pour la V1. À connecter plus tard à n8n ou à un mailto. -->
        <form class="contact-form" aria-label="Formulaire de contact non branché">
          <div class="field">
            <label class="label" for="contactName">Nom</label>
            <div class="control">
              <input id="contactName" class="input" type="text" autocomplete="name" />
            </div>
          </div>
          <div class="field">
            <label class="label" for="contactEmail">Email</label>
            <div class="control">
              <input id="contactEmail" class="input" type="email" autocomplete="email" />
            </div>
          </div>
          <div class="field">
            <label class="label" for="contactMessage">Message</label>
            <div class="control">
              <textarea id="contactMessage" class="textarea"></textarea>
            </div>
          </div>
          <button class="button content-primary-button" type="button">Envoyer</button>
        </form>
      </article>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
